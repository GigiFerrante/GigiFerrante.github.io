<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orologio Vivente - Inspired Design</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }
        #canvasContainer {
            position: relative;
            width: 80vmin;
            height: 80vmin;
            max-width: 100%;
            max-height: 100%;
            margin-top: 20px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #glassCanvas {
            z-index: 3;
            pointer-events: none;
        }
        #handsCanvas {
            z-index: 2;
            pointer-events: none;
        }
        #manCanvas {
            z-index: 1;
            /* Filtro traslucido pesante: forte sfocatura e ridotta opacità per nasconderlo dietro il vetro */
            filter: blur(14px) contrast(1.2) opacity(0.45);
        }
        /* Box di testo per i dettagli sul progetto in inglese */
        .info-box {
            z-index: 10;
            max-width: 600px;
            text-align: center;
            padding: 20px;
            margin-top: 25px;
            font-size: 14px;
            line-height: 1.6;
            color: #aaaaaa;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .info-box strong {
            color: #00b4d8;
            font-size: 15px;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="canvasContainer">
        <!-- Strato 1: L'omino gigante dietro il vetro traslucido -->
        <canvas id="manCanvas"></canvas>
        <!-- Strato 2: Le lancette dipinte in primo piano -->
        <canvas id="handsCanvas"></canvas>
        <!-- Strato 3: Il quadrante dell'orologio e il riflesso del vetro esterno -->
        <canvas id="glassCanvas"></canvas>
    </div>

    <!-- Box informativo inserito in basso -->
    <div class="info-box">
        <strong>The Living Clock Project</strong>
        This project is inspired by the artistic clock concept at Grand Central Terminal, where a real man was filmed continuously for 12 hours to record the video loop, physically painting and erasing the clock hands minute by minute to keep the time perfectly accurate.
    </div>

    <script>
        const manCanvas = document.getElementById('manCanvas');
        const handsCanvas = document.getElementById('handsCanvas');
        const glassCanvas = document.getElementById('glassCanvas');

        const ctxMan = manCanvas.getContext('2d');
        const ctxHands = handsCanvas.getContext('2d');
        const ctxGlass = glassCanvas.getContext('2d');

        let width, height, radius;
        let lastMinute = -1;

        // Stato dell'animazione dell'omino gigante vincolato in basso
        let man = {
            x: 0,
            y: 0,
            targetX: 0,
            targetY: 0,
            state: 'idle', // 'idle', 'moving_to_erase', 'erasing', 'moving_to_paint', 'painting'
            progress: 0,
            currentAngle: 0,
            oldMinute: 0,
            newMinute: 0,
            limbAngle: 0
        };

        // Parametri delle lancette correnti
        let currentHands = {
            hourAngle: 0,
            minuteAngle: 0,
            isErased: false,
            paintProgress: 1
        };

        function resize() {
            const container = document.getElementById('canvasContainer');
            const size = Math.min(container.clientWidth, container.clientHeight);
            width = size;
            height = size;
            radius = size * 0.45;

            [manCanvas, handsCanvas, glassCanvas].forEach(canvas => {
                canvas.width = size;
                canvas.height = size;
            });

            // L'omino ora è vincolato gravitazionalmente alla base dell'orologio
            man.x = width / 2;
            man.y = height / 2 + radius * 0.35; 
            man.targetX = man.x;
            man.targetY = man.y;

            drawGlass();
            renderHandsStatic();
        }

        function drawGlass() {
            ctxGlass.clearRect(0, 0, width, height);
            const cx = width / 2;
            const cy = height / 2;

            // Bordo esterno dell'orologio
            ctxGlass.strokeStyle = '#2b2b2b';
            ctxGlass.lineWidth = radius * 0.04;
            ctxGlass.beginPath();
            ctxGlass.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctxGlass.stroke();

            // Tacche delle ore
            ctxGlass.fillStyle = '#ffffff';
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                ctxGlass.save();
                ctxGlass.translate(cx, cy);
                ctxGlass.rotate(angle);
                ctxGlass.fillRect(-radius * 0.015, -radius + radius * 0.03, radius * 0.03, radius * 0.07);
                ctxGlass.restore();
            }

            // Riflesso vetrato superficiale
            const gradient = ctxGlass.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.12)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.03)');
            gradient.addColorStop(0.5, 'rgba(0, 0, 0, 0.0)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.04)');

            ctxGlass.fillStyle = gradient;
            ctxGlass.beginPath();
            ctxGlass.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctxGlass.fill();
        }

        // Disegna l'omino INGRANDITO (tre quarti dell'orologio) e ancorato alla base
        function drawMan(x, y, actionProgress = 0, type = 'idle') {
            ctxMan.clearRect(0, 0, width, height);
            
            const cx = width / 2;
            const cy = height / 2;
            
            ctxMan.save();
            
            // Animazione oscillatoria per i movimenti delle braccia e del corpo
            man.limbAngle = Math.sin(Date.now() * 0.004) * 0.25;
            
            // Proporzioni giganti: l'altezza complessiva occupa circa i 3/4 dell'orologio (radius * 1.3)
            const scale = radius * 1.3; 

            // Corpo/Busto (Tuta azzurra)
            ctxMan.fillStyle = '#00b4d8'; // Azzurro ciano vivido (spicca maggiormente sotto il blur pesante)
            ctxMan.strokeStyle = '#0077b6';
            ctxMan.lineWidth = scale * 0.02;

            // Testa (colore carne saturo per trasparire dal filtro)
            ctxMan.fillStyle = '#ffb703';
            ctxMan.beginPath();
            ctxMan.arc(x, y - scale * 0.5, scale * 0.12, 0, Math.PI * 2);
            ctxMan.fill();
            ctxMan.stroke();

            // Tuta azzurra (Busto)
            ctxMan.fillStyle = '#00b4d8';
            ctxMan.beginPath();
            ctxMan.moveTo(x - scale * 0.18, y - scale * 0.38);
            ctxMan.lineTo(x + scale * 0.18, y - scale * 0.38);
            ctxMan.lineTo(x + scale * 0.14, y);
            ctxMan.lineTo(x - scale * 0.14, y);
            ctxMan.closePath();
            ctxMan.fill();
            ctxMan.stroke();

            // Gambe massicce poggiate stabilmente in basso
            ctxMan.strokeStyle = '#00b4d8';
            ctxMan.lineWidth = scale * 0.09;
            ctxMan.lineCap = 'round';
            
            ctxMan.beginPath();
            // Gamba sinistra fissa
            ctxMan.moveTo(x - scale * 0.09, y);
            ctxMan.lineTo(x - scale * 0.12, y + scale * 0.35);
            // Gamba destra fissa
            ctxMan.moveTo(x + scale * 0.09, y);
            ctxMan.lineTo(x + scale * 0.12, y + scale * 0.35);
            ctxMan.stroke();

            // Braccia lunghe per raggiungere l'orologio restando ancorato in basso
            ctxMan.lineWidth = scale * 0.06;
            
            if (type === 'erase') {
                // Il braccio si allunga dal corpo fino al punto esatto da cancellare
                ctxMan.beginPath();
                ctxMan.moveTo(x - scale * 0.15, y - scale * 0.3);
                
                let shake = Math.sin(Date.now() * 0.06) * 7;
                let handX = man.targetX + shake;
                let handY = man.targetY + shake;
                
                ctxMan.lineTo(handX, handY);
                ctxMan.stroke();

                // Strumento spugna gigante
                ctxMan.fillStyle = '#ffffff';
                ctxMan.fillRect(handX - 15, handY - 15, 30, 30);

            } else if (type === 'paint') {
                // Il braccio si allunga dal corpo fino alla punta della nuova lancetta che cresce
                ctxMan.beginPath();
                ctxMan.moveTo(x + scale * 0.15, y - scale * 0.3);
                
                let handX = cx + Math.sin(man.currentAngle) * radius * 0.7 * actionProgress;
                let handY = cy - Math.cos(man.currentAngle) * radius * 0.7 * actionProgress;
                
                ctxMan.lineTo(handX, handY);
                ctxMan.stroke();

                // Pennellone gigante
                ctxMan.fillStyle = '#ff006e';
                ctxMan.fillRect(handX - 12, handY - 12, 24, 24);

            } else {
                // Braccia piegate a riposo sui fianchi, stabili
                ctxMan.beginPath();
                ctxMan.moveTo(x - scale * 0.15, y - scale * 0.3);
                ctxMan.lineTo(x - scale * 0.22, y - scale * 0.1 + man.limbAngle * 10);
                ctxMan.moveTo(x + scale * 0.15, y - scale * 0.3);
                ctxMan.lineTo(x + scale * 0.22, y - scale * 0.1 - man.limbAngle * 10);
                ctxMan.stroke();
            }

            ctxMan.restore();
        }

        function renderHandsStatic() {
            ctxHands.clearRect(0, 0, width, height);
            const cx = width / 2;
            const cy = height / 2;

            // Ore
            ctxHands.save();
            ctxHands.translate(cx, cy);
            ctxHands.rotate(currentHands.hourAngle);
            ctxHands.strokeStyle = '#ffffff';
            ctxHands.lineWidth = radius * 0.05;
            ctxHands.lineCap = 'round';
            ctxHands.beginPath();
            ctxHands.moveTo(0, radius * 0.1);
            ctxHands.lineTo(0, -radius * 0.5);
            ctxHands.stroke();
            ctxHands.restore();

            // Minuti
            if (!currentHands.isErased) {
                ctxHands.save();
                ctxHands.translate(cx, cy);
                ctxHands.rotate(currentHands.minuteAngle);
                ctxHands.strokeStyle = '#ff006e'; 
                ctxHands.lineWidth = radius * 0.035;
                ctxHands.lineCap = 'round';
                ctxHands.beginPath();
                ctxHands.moveTo(0, radius * 0.1);
                
                const length = -radius * 0.7 * currentHands.paintProgress;
                ctxHands.lineTo(0, length);
                ctxHands.stroke();
                ctxHands.restore();
            }

            // Perno centrale nitido sopra tutto
            ctxHands.fillStyle = '#ffffff';
            ctxHands.beginPath();
            ctxHands.arc(cx, cy, radius * 0.045, 0, 2 * Math.PI);
            ctxHands.fill();
        }

        function updateClockLogic() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();

            const hrAngle = ((hours % 12) * Math.PI / 6) + (minutes * Math.PI / 360);
            const minAngle = (minutes * Math.PI / 30);

            currentHands.hourAngle = hrAngle;

            if (minutes !== lastMinute) {
                if (lastMinute === -1) {
                    currentHands.minuteAngle = minAngle;
                    man.oldMinute = minutes;
                    man.newMinute = minutes;
                    lastMinute = minutes;
                } else {
                    man.oldMinute = lastMinute;
                    man.newMinute = minutes;
                    lastMinute = minutes;
                    
                    man.state = 'moving_to_erase';
                    man.progress = 0;
                    
                    const oldAngle = (man.oldMinute * Math.PI / 30);
                    const cx = width / 2;
                    const cy = height / 2;
                    
                    // L'obiettivo del braccio è la punta della vecchia lancetta dei minuti
                    man.targetX = cx + Math.sin(oldAngle) * radius * 0.7;
                    man.targetY = cy - Math.cos(oldAngle) * radius * 0.7;
                }
            }
        }

        function loop() {
            updateClockLogic();

            // Il corpo dell'uomo rimane fermo e pesante alla base a causa della gravità (non si sposta camminando)
            const baseManX = width / 2;
            const baseManY = height / 2 + radius * 0.28;

            if (man.state === 'idle') {
                man.x = baseManX;
                man.y = baseManY;
                drawMan(man.x, man.y, 0, 'idle');
                renderHandsStatic();

            } else if (man.state === 'moving_to_erase') {
                man.progress += 0.008; // Rallentato l'allungamento del braccio
                if (man.progress >= 1) {
                    man.progress = 1;
                    man.state = 'erasing';
                    man.progress = 0;
                }
                man.x = baseManX;
                man.y = baseManY;
                
                let leanX = (man.targetX - baseManX) * 0.08;
                drawMan(man.x + leanX, man.y, 0, 'idle');
                renderHandsStatic();

            } else if (man.state === 'erasing') {
                man.progress += 0.005; // Rallentato il tempo impiegato per cancellare
                if (man.progress >= 1) {
                    currentHands.isErased = true;
                    man.state = 'moving_to_paint';
                    man.progress = 0;

                    const newAngle = (man.newMinute * Math.PI / 30);
                    man.currentAngle = newAngle;
                }
                
                let leanX = (man.targetX - baseManX) * 0.08;
                drawMan(man.x + leanX, man.y, man.progress, 'erase');
                
                ctxHands.clearRect(0, 0, width, height);
                currentHands.paintProgress = 1 - man.progress;
                renderHandsStatic();

            } else if (man.state === 'moving_to_paint') {
                man.progress += 0.008; // Rallentata la transizione verso la nuova posizione
                if (man.progress >= 1) {
                    man.progress = 1;
                    man.state = 'painting';
                    man.progress = 0;
                    currentHands.isErased = false;
                    currentHands.minuteAngle = man.currentAngle;
                }
                drawMan(baseManX, baseManY, 0, 'idle');
                renderHandsStatic();

            } else if (man.state === 'painting') {
                man.progress += 0.004; // Rallentato il disegno graduale della nuova linea
                if (man.progress >= 1) {
                    man.progress = 1;
                    man.state = 'idle';
                }

                currentHands.paintProgress = man.progress;
                
                const newAngle = (man.newMinute * Math.PI / 30);
                let targetPaintX = width / 2 + Math.sin(newAngle) * radius * 0.7;
                let leanX = (targetPaintX - baseManX) * 0.05 * man.progress;
                
                drawMan(baseManX + leanX, baseManY, man.progress, 'paint');
                renderHandsStatic();
            }

            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        // Ritardo minimo per permettere al CSS Flexbox di stabilizzare i contenitori
        setTimeout(resize, 50);
        loop();
    </script>
</body>
</html>
