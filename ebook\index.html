<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceShelf | AI PDF Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-32">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">V</div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">VoiceShelf</h1>
        </div>
        <div class="flex gap-4">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <label for="fileInput" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full text-sm font-medium transition cursor-pointer shadow-lg shadow-indigo-200 flex items-center gap-2">
                <span>＋</span> Carica PDF
            </label>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-10">
        
        <div class="flex gap-3 mb-8 overflow-x-auto pb-2" id="categoryFilters">
            <button onclick="filterBooks('all')" class="bg-white border border-slate-200 px-4 py-1.5 rounded-full text-sm hover:border-indigo-500 transition shadow-sm">Tutti</button>
        </div>

        <div id="bookGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <div id="emptyState" class="hidden text-center py-20">
            <p class="text-slate-400">Nessun libro caricato. Comincia aggiungendo il tuo primo PDF!</p>
        </div>
    </main>

    <div id="playerBar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-3xl glass border border-slate-200 rounded-3xl shadow-2xl p-6 hidden z-50">
        <div class="flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div>
                    <h4 id="nowPlayingTitle" class="font-bold text-slate-800 truncate max-w-[200px]">Titolo Libro</h4>
                    <p id="nowPlayingProgress" class="text-xs text-slate-500 uppercase tracking-widest">Frase 0 di 0</p>
                </div>
                <button onclick="closePlayer()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
            </div>
            
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSpeech()" id="playBtn" class="w-14 h-14 bg-indigo-600 rounded-full text-white text-2xl flex items-center justify-center hover:scale-105 transition shadow-lg shadow-indigo-100">
                        ▶
                    </button>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Velocità</span>
                        <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1" class="w-24 accent-indigo-600">
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Tono</span>
                        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1" class="w-24 accent-indigo-600">
                    </div>
                </div>
                
                <div class="flex flex-col items-end gap-1">
                     <span id="speedDisplay" class="text-xs font-medium text-indigo-600 bg-indigo-50 px-2 py-1 rounded">1.0x</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let library = JSON.parse(localStorage.getItem('voiceShelf_db')) || [];
        let currentUtterance = null;
        let isPlaying = false;
        let currentBookId = null;
        let sentences = [];
        let currentSentenceIndex = 0;

        // --- INIZIALIZZAZIONE ---
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', handleUpload);
        document.getElementById('speed').oninput = (e) => {
            document.getElementById('speedDisplay').innerText = e.target.value + 'x';
            if(isPlaying) { stopSpeech(); toggleSpeech(); }
        };

        function renderLibrary() {
            const grid = document.getElementById('bookGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';

            if (library.length === 0) {
                empty.classList.remove('hidden');
                return;
            } else {
                empty.classList.add('hidden');
            }

            library.forEach((book, index) => {
                const progress = book.totalSentences > 0 ? Math.round((book.resumeIndex / book.totalSentences) * 100) : 0;
                const card = `
                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">${book.category}</span>
                            <button onclick="deleteBook(${index})" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition">&times; Rimuovi</button>
                        </div>
                        <h3 class="font-bold text-lg mb-2 text-slate-800 leading-tight h-14 overflow-hidden">${book.title}</h3>
                        
                        <div class="mb-6">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-slate-400">Progresso</span>
                                <span class="font-bold text-indigo-600">${progress}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-indigo-600 h-full progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <button onclick="loadBook(${index})" class="w-full bg-slate-900 text-white py-3 rounded-xl font-medium hover:bg-indigo-600 transition flex items-center justify-center gap-2">
                                🎧 ${progress > 0 ? 'Continua Ascolto' : 'Inizia Ascolto'}
                            </button>
                            <textarea onchange="updateReview(${index}, this.value)" placeholder="Aggiungi una nota o recensione..." class="w-full text-xs p-3 bg-slate-50 border-none rounded-xl focus:ring-1 focus:ring-indigo-500 resize-none">${book.review || ''}</textarea>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
            renderCategories();
        }

        // --- LOGICA PDF ---
        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + " ";
                }

                // Split semplice per frasi
                const cleanSentences = fullText.split(/[.!?]+/).filter(s => s.trim().length > 3);

                const newBook = {
                    id: Date.now(),
                    title: file.name.replace('.pdf', ''),
                    content: cleanSentences,
                    totalSentences: cleanSentences.length,
                    resumeIndex: 0,
                    category: 'Generale',
                    review: ''
                };

                library.push(newBook);
                saveData();
                renderLibrary();
            };
            reader.readAsArrayBuffer(file);
        }

        // --- CONTROLLI AUDIO ---
        function loadBook(index) {
            const book = library[index];
            currentBookId = index;
            sentences = book.content;
            currentSentenceIndex = book.resumeIndex;
            
            document.getElementById('nowPlayingTitle').innerText = book.title;
            document.getElementById('playerBar').classList.remove('hidden');
            updatePlayerUI();
            
            if(isPlaying) stopSpeech();
        }

        function toggleSpeech() {
            if (isPlaying) {
                stopSpeech();
            } else {
                startSpeech();
            }
        }

        function startSpeech() {
            if (currentSentenceIndex >= sentences.length) {
                currentSentenceIndex = 0;
            }

            isPlaying = true;
            document.getElementById('playBtn').innerText = '⏸';
            speakRecursive();
        }

        function speakRecursive() {
            if (!isPlaying || currentSentenceIndex >= sentences.length) {
                isPlaying = false;
                document.getElementById('playBtn').innerText = '▶';
                return;
            }

            currentUtterance = new SpeechSynthesisUtterance(sentences[currentSentenceIndex]);
            currentUtterance.rate = document.getElementById('speed').value;
            currentUtterance.pitch = document.getElementById('pitch').value;
            currentUtterance.lang = 'it-IT';

            currentUtterance.onend = () => {
                currentSentenceIndex++;
                library[currentBookId].resumeIndex = currentSentenceIndex;
                saveData();
                updatePlayerUI();
                renderLibrary();
                speakRecursive();
            };

            window.speechSynthesis.speak(currentUtterance);
        }

        function stopSpeech() {
            isPlaying = false;
            window.speechSynthesis.cancel();
            document.getElementById('playBtn').innerText = '▶';
        }

        // --- UTILITY ---
        function updatePlayerUI() {
            document.getElementById('nowPlayingProgress').innerText = `Frase ${currentSentenceIndex + 1} di ${sentences.length}`;
        }

        function saveData() {
            localStorage.setItem('voiceShelf_db', JSON.stringify(library));
        }

        function deleteBook(index) {
            if(confirm('Eliminare questo libro?')) {
                library.splice(index, 1);
                saveData();
                renderLibrary();
                if(currentBookId === index) closePlayer();
            }
        }

        function updateReview(index, value) {
            library[index].review = value;
            saveData();
        }

        function closePlayer() {
            stopSpeech();
            document.getElementById('playerBar').classList.add('hidden');
        }

        function renderCategories() {
            const container = document.getElementById('categoryFilters');
            const cats = ['all', ...new Set(library.map(b => b.category))];
            // Implementazione filtro veloce volendo espandere
        }

        // Init al caricamento
        renderLibrary();

    </script>
</body>
          </html>
